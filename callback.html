<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CreatorPost — Authorization</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0b; color: #f4f4f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .card { text-align: center; max-width: 400px; padding: 40px; }
        .icon { font-size: 48px; margin-bottom: 20px; }
        h1 { font-size: 22px; margin-bottom: 8px; }
        p { color: #a1a1aa; font-size: 14px; line-height: 1.6; margin-bottom: 16px; }
        code { background: #1c1c1f; padding: 8px 16px; border-radius: 8px; display: block; margin: 16px 0; font-size: 13px; color: #25f4ee; word-break: break-all; }
        .note { font-size: 12px; color: #71717a; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">✅</div>
        <h1>Authorization Successful</h1>
        <p>TikTok authorization complete. You can now return to CreatorPost.</p>
        <p>TikTok 授权成功，请返回 CreatorPost 应用。</p>
        <code id="auth-code"></code>
        <p class="note">This page will pass the authorization code back to CreatorPost automatically.<br>此页面会自动将授权码传回 CreatorPost。</p>
    </div>
    <script>
        const params = new URLSearchParams(window.location.search);
        const code = params.get('code');
        if (code) {
            document.getElementById('auth-code').textContent = 'Auth code received';
        }
    </script>
</body>
</html>
